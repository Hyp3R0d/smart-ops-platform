server:
  port: 8087
spring:
  application:
    name: job-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/smart_ops?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: stock-alert-job-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
  config:
    import:
      - optional:nacos:job-service.yml
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
springdoc:
  swagger-ui:
    enabled: true
smart:
  jwt:
    secret: smart-ops-dev-secret-key-please-change-in-production-123456
    expire-seconds: 86400
    issuer: smart-ops
  mail:
    mock: true
    to: ops@example.com
  job:
    low-stock-cron: "0 */5 * * * ?"
