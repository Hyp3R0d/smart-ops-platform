server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1
        - id: organization-service
          uri: lb://organization-service
          predicates:
            - Path=/api/organization/**
          filters:
            - StripPrefix=1
        - id: purchase-service
          uri: lb://purchase-service
          predicates:
            - Path=/api/purchase/**
          filters:
            - StripPrefix=1
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=1
        - id: dashboard-service
          uri: lb://dashboard-service
          predicates:
            - Path=/api/dashboard/**
          filters:
            - StripPrefix=1
        - id: job-service
          uri: lb://job-service
          predicates:
            - Path=/api/job/**
          filters:
            - StripPrefix=1
  config:
    import:
      - optional:nacos:gateway-service.yml

smart:
  jwt:
    secret: smart-ops-dev-secret-key-please-change-in-production-123456
    expire-seconds: 86400
    issuer: smart-ops
